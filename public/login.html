<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#021a0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A26 Game">
<meta name="description" content="A26 - Live Card Game with AI virtual dealer">
<title>A26 - Login</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/icons/icon-256.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="/images/a26-logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Montserrat:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css?v=dh12">
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/images/a26-logo.svg" alt="A26" class="auth-logo-img">
      <p class="subtitle">Live Card Game · AI Digital Dealer</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Login</button>
      <button class="auth-tab" data-tab="register">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="auth-form active">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" required autocomplete="username" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="Enter password">
      </div>
      <div class="form-error" id="loginError"></div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUsername" required placeholder="Choose a username" minlength="3">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" required placeholder="Create password" minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="regConfirm" required placeholder="Confirm password">
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="tel" id="regPhone" placeholder="Phone number">
      </div>
      <div class="form-group">
        <label>Email (optional)</label>
        <input type="email" id="regEmail" placeholder="Email address">
      </div>
      <div class="form-error" id="regError"></div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>

    <div class="auth-footer">
      <p>Demo admin: <strong>admin</strong> / <strong>admin123</strong></p>
      <hr style="border-color:rgba(212,168,67,0.25);margin:14px 0;">
      <p style="font-size:0.78rem;color:#bbb;margin-bottom:8px;">Want to try the game first?</p>
      <a href="/index.html" class="btn btn-full guest-btn">Play as Guest (unlimited coins)</a>
      <p style="font-size:0.7rem;color:#888;margin-top:8px;">Guests can explore the full game with unlimited sample coins. To place real bets, register a free account.</p>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
// Redirect if already logged in. Guests (not logged in) can just click
// "Play as Guest" to enter the game without registering.
if (Auth.isLoggedIn()) {
  const user = Auth.getUser();
  window.location.href = user.role === 'admin' ? '/admin.html' : '/dashboard.html';
}

// Tab switching
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
  });
});

// Login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';

  try {
    const data = await Auth.api('/api/login', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('loginUsername').value,
        password: document.getElementById('loginPassword').value
      })
    });

    Auth.setAuth(data.token, data.user);
    window.location.href = data.user.role === 'admin' ? '/admin.html' : '/dashboard.html';
  } catch (err) {
    errEl.textContent = err.message;
  }
});

// Register
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('regError');
  errEl.textContent = '';

  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;

  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match';
    return;
  }

  try {
    const data = await Auth.api('/api/register', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('regUsername').value,
        password,
        phone: document.getElementById('regPhone').value,
        email: document.getElementById('regEmail').value
      })
    });

    Auth.setAuth(data.token, data.user);
    window.location.href = '/dashboard.html';
  } catch (err) {
    errEl.textContent = err.message;
  }
});
</script>
</body>
</html>
