<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56">
  <defs>
    <linearGradient id="navBgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2a18"/>
      <stop offset="100%" stop-color="#021a0e"/>
    </linearGradient>
    <linearGradient id="navGoldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6b8"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#a8801f"/>
    </linearGradient>
    <linearGradient id="navRedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c5b"/>
      <stop offset="100%" stop-color="#8c1620"/>
    </linearGradient>
  </defs>

  <!-- Compact chip medallion -->
  <g transform="translate(28 28)">
    <circle cx="0" cy="0" r="26" fill="url(#navBgGrad)" stroke="url(#navGoldGrad)" stroke-width="3"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#navGoldGrad)" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
    <!-- mini cards -->
    <g transform="rotate(-12)">
      <rect x="-15" y="-15" width="14" height="20" rx="2" fill="#fff8ee" stroke="url(#navGoldGrad)" stroke-width="0.5"/>
      <text x="-12" y="-1" font-family="Playfair Display, serif" font-size="9" font-weight="900" fill="#1a1a1a">A</text>
    </g>
    <g transform="rotate(12)">
      <rect x="1" y="-15" width="14" height="20" rx="2" fill="#fff8ee" stroke="url(#navGoldGrad)" stroke-width="0.5"/>
      <text x="4" y="-1" font-family="Playfair Display, serif" font-size="9" font-weight="900" fill="#c41e3a">6</text>
    </g>
    <!-- LIVE dot -->
    <circle cx="0" cy="14" r="3" fill="url(#navRedGrad)"/>
  </g>

  <!-- A26 wordmark -->
  <text x="70" y="38" font-family="Cinzel Decorative, Playfair Display, serif" font-size="28" font-weight="900" fill="url(#navGoldGrad)" letter-spacing="4">A26</text>

  <!-- Tagline -->
  <text x="128" y="22" font-family="Montserrat, sans-serif" font-size="7" font-weight="700" fill="#d4a843" letter-spacing="2">LIVE</text>
  <text x="128" y="32" font-family="Montserrat, sans-serif" font-size="7" font-weight="700" fill="#d4a843" letter-spacing="2">CARD</text>
  <text x="128" y="42" font-family="Montserrat, sans-serif" font-size="7" font-weight="700" fill="#d4a843" letter-spacing="2">GAME</text>
</svg>
